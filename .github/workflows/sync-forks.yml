name: 🔄 Sync All Forks

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (list forks but don't actually sync)"
        type: boolean
        default: false
      force_sync:
        description: "Force sync (overwrites diverged forks - use with caution)"
        type: boolean
        default: false
      exclude_repos:
        description: "Comma-separated repo names to skip (e.g. repo-name-1,repo-name-2)"
        type: string
        default: ""

  schedule:
    - cron: "0 9 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-forks:
    name: Sync All Forks to Upstream
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout fork-manager
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run fork sync
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_USERNAME: ${{ github.actor }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          FORCE_SYNC: ${{ inputs.force_sync || 'false' }}
          EXCLUDE_REPOS: ${{ inputs.exclude_repos }}
          PERMANENT_EXCLUDES: ""
        run: |
          if [ -n "$PERMANENT_EXCLUDES" ] && [ -n "$EXCLUDE_REPOS" ]; then
            export EXCLUDE_REPOS="$PERMANENT_EXCLUDES,$EXCLUDE_REPOS"
          elif [ -n "$PERMANENT_EXCLUDES" ]; then
            export EXCLUDE_REPOS="$PERMANENT_EXCLUDES"
          fi
          node sync.js
